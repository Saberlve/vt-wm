# VT-WM on the UniVTAC benchmark (GelSight Mini tactile via Sparsh-DINO).
# 2 GelSight sensors (left+right finger), head camera, joint-qpos action (8-dim,
# 7 arm + 1 gripper; chunk size 1). Predictor 4 layers (first runnable, like manifeel).

paths:
  cosmos_encoder_jit: /mount/localcq1/wangshuxun/model_wsx/models/cosmos/Cosmos-Tokenize1-CI16x16-360p/encoder.jit
  sparsh_dino_ckpt: /mount/localcq1/wangshuxun/model_wsx/models/sparsh/sparsh-dino-base/dino_vitbase.safetensors
  out_dir: /dev/shm/wsx/vt-wm/runs/univtac_lift_bottle

device: cuda

encoder:
  tactile: sparsh_gelsight
  freeze_tactile: false   # fine-tune Sparsh-DINO (paper fine-tunes the tactile encoder)

data:
  source: univtac
  # single episode dir (e.g. grasp_classify/clean) or a parent with several {task}/{config} stores
  data_root: /mount/localcq1/wangshuxun/dataset/lift_bottle/clean
  camera: head            # head | wrist
  tactile_keys: null      # null -> auto-detect (left_gsmini/right_gsmini, else left_tactile/...)
  tactile_image: rgb_marker
  T: 9
  frame_stride: 10        # source is 60Hz; stride 10 -> ~6Hz vision (T=9 -> ~1.5s window)
  num_sensors: 2
  action_chunk: 10
  action_dim: 8           # 7 arm + 1 gripper (joint qpos)
  tactile_num_frames: 2
  tactile_stride: 5      # 2-frame current-step stack spans ~0.16s @60Hz (paper tactile window)
  rgb_hw: [192, 320]
  tactile_hw: [224, 224]
  val_ratio: 0.05
  max_episodes: null      # cap episodes (set small for quick test train)

model:
  dim: 512
  depth: 4
  num_heads: 8
  mlp_ratio: 4.0
  max_temporal: 64
  tactile_dim: 768

train:
  batch_size_per_gpu: 8   # PER-GPU; global batch = this * num_gpus (DDP shards indices only)
  precision: bf16          # bf16 autocast (no GradScaler); set fp32/none to disable
  num_workers: 4
  steps: 40000
  warmup_steps: 5000
  peak_lr: 3.0e-4
  final_lr: 3.0e-7
  weight_decay: 0.01
  betas: [0.9, 0.95]
  sampling_horizon: 4
  tactile_lr_scale: 0.1
  log_every: 20
  eval_every: 5000
  eval_start: 0           # only run validation once step >= eval_start (delay early/noisy evals)
  val_batches: 8          # # batches for the val state-prediction loss
  eval_action_mse: true   # also log CEM-planned-vs-GT action MSE on val (val/action_mse)
  val_action_windows: 4   # # val windows to plan per eval (CEM is heavy: particles*iters rollouts each)
  val_plan_horizon: 4     # action steps to plan toward the window's final visual latent (<= T-1)
  val_plan_sigma: 0.1     # CEM init std around the last context action (abs joint-qpos prior)
  save_every: 2000
  seed: 42

wandb:
  enabled: true
  project: vt-wm
  name: univtac_lift_bottle
  mode: online

planning:
  freq: 6
  horizon_s: 4
  particles: 36
  iters: 10
  elites: 5
  max_context: 9
