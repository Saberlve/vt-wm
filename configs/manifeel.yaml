# VT-WM on the ManiFeel dataset (GelSight tactile via Sparsh-DINO).
# Adaptations vs the paper: 2 GelSight sensors (left+right finger), single exocentric
# `front` camera, 6-dim action (chunk size 1). Predictor still 4 layers (first runnable).

paths:
  cosmos_encoder_jit: /run/determined/NAS1/public/wangshuxun/models/cosmos/Cosmos-Tokenize1-CI16x16-360p/encoder.jit
  sparsh_dino_ckpt: /run/determined/NAS1/public/wangshuxun/models/sparsh/sparsh-dino-base/dino_vitbase.safetensors
  out_dir: ./runs/manifeel

device: cuda

encoder:
  tactile: sparsh_gelsight
  freeze_tactile: false   # fine-tune Sparsh-DINO (paper fine-tunes the tactile encoder)

data:
  source: manifeel
  # single task dir, or the extracted/ root (all task subdirs -> multi-task training)
  zarr_path: /run/determined/NAS1/public/wangshuxun/manifeel/extracted
  # camera candidates (first present per task); tasks vary: some lack `front`/`side`.
  rgb_key: [front, side, wrist, wrist_2]
  tactile_keys: [left_tactile_camera_taxim, right_tactile_camera_taxim]
  action_key: action
  T: 9
  num_sensors: 2
  action_chunk: 1
  action_dim: 7   # tasks vary 6/7; loader pads 6-dim actions to 7
  tactile_num_frames: 2
  tactile_stride: 5
  rgb_hw: [192, 320]
  tactile_hw: [224, 224]
  val_ratio: 0.02

model:
  dim: 256
  depth: 4
  num_heads: 8
  mlp_ratio: 4.0
  max_temporal: 64
  tactile_dim: 768

train:
  batch_size: 1
  num_workers: 4
  steps: 50
  warmup_steps: 10
  peak_lr: 3.0e-4
  final_lr: 3.0e-7
  weight_decay: 0.01
  betas: [0.9, 0.95]
  sampling_horizon: 3
  tactile_lr_scale: 0.1   # fine-tune the encoder at 0.1x the predictor LR
  log_every: 1
  eval_every: 25          # run validation every N steps
  val_batches: 8
  save_every: 25          # write last.pt for resume (--resume auto)
  seed: 0

wandb:
  enabled: true
  project: vt-wm
  name: null              # auto-named if null
  mode: online            # 'offline' if no network/login (curves sync later)

planning:
  freq: 6
  horizon_s: 2
  particles: 36
  iters: 10
  elites: 5
  max_context: 9
